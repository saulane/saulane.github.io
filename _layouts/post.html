---
layout: default
---

<main>
  <article class="article">
    <header class="article-header">
      <p class="meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: site.minima.date_format }}</time>
      </p>
      <h1>{{ page.title }}</h1>
    </header>

    {{ content }}
  </article>
</main>
